name: Automatic Code Review

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  code-review:
    runs-on: ubuntu-latest
    name: Review Code Changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run type-check
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run custom code review
        run: npm run review
        continue-on-error: true

      - name: Check for formatting issues
        run: npx prettier --check "**/*.{ts,tsx,json,md}"
        continue-on-error: true

      - name: Generate review summary
        if: always()
        run: |
          echo "## 📊 Code Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files Changed:**" >> $GITHUB_STEP_SUMMARY
          git diff origin/main --name-only | grep -E '\.(ts|tsx|js|jsx)$' || echo "No TypeScript/JavaScript files changed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Diff Statistics:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff origin/main --stat || echo "No changes" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with review results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            // Get changed files
            const changedFiles = execSync('git diff origin/main --name-only').toString().split('\n').filter(f => f && /\.(ts|tsx)$/.test(f));
            
            // Get diff stats
            const diffStat = execSync('git diff origin/main --stat').toString();
            
            const comment = `## 🔍 Automatic Code Review Results
            
### Changed Files (TypeScript/JavaScript)
${changedFiles.length > 0 ? changedFiles.map(f => `- ${f}`).join('\n') : 'No TypeScript/JavaScript files changed'}

### Diff Statistics
\`\`\`
${diffStat}
\`\`\`

### Checks Performed
- ✓ TypeScript type checking
- ✓ ESLint validation
- ✓ Code formatting
- ✓ Security issue detection

Run \`npm run review\` locally to see detailed analysis.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
